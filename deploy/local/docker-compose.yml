services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    ports:
      - "6432:6432"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_PREPARED_STATEMENTS: 0
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 100
      AUTH_TYPE: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
    entrypoint: ["/app/efbundle"]
    command: ["--connection", "${ConnectionStrings__MigrationConnection}"]
    environment:
      ConnectionStrings__MigrationConnection: ${ConnectionStrings__MigrationConnection}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      AUTH__MODE: ${AUTH__MODE}
      AUTH__APIKEY: ${AUTH__APIKEY}
      Onnx__ModelPath: models/model.onnx
      Onnx__VocabPath: models/vocab.txt
      # Aggregator up-sync (ADR-013) — off by default; see .env.example.
      Sync__Enabled: ${SYNC__ENABLED:-false}
      Sync__HubUrl: ${SYNC__HUBURL:-}
      Sync__TokenEndpoint: ${SYNC__TOKENENDPOINT:-}
      Sync__ClientId: ${SYNC__CLIENTID:-}
      Sync__ClientSecret: ${SYNC__CLIENTSECRET:-}
    depends_on:
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
