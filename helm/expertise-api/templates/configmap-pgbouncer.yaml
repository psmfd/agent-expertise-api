{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "expertise-api.fullname" . }}-pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "expertise-api.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    * = host=127.0.0.1 port=5432

    [pgbouncer]
    pool_mode = transaction
    default_pool_size = 10
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    max_client_conn = 50
    max_db_connections = 40
    max_prepared_statements = 0

    listen_port = 6432
    listen_addr = *

    # auth_query requires the PgBouncer connection user to have pg_shadow access (superuser).
    # This works because the default POSTGRES_USER created by the postgres image is a superuser.
    auth_type = scram-sha-256
    auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1
    auth_dbname = expertise

    server_reset_query =
    server_idle_timeout = 300
    client_idle_timeout = 0

    log_connections = 0
    log_disconnections = 0
    log_stats = 1
    stats_period = 60

    ignore_startup_parameters = extra_float_digits
{{- end }}
