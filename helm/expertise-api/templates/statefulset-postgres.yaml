{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "expertise-api.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "expertise-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "expertise-api.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "expertise-api.postgresSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "expertise-api.postgresSelectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 120
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          # readOnlyRootFilesystem deferred — postgres writes to /tmp, /var/run/postgresql,
          # and the entrypoint expects to mutate /var/lib/postgresql; tightening to ROFS
          # requires extra emptyDir mounts and is tracked separately.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Values.postgres.secretName }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: dshm
              mountPath: /dev/shm
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: postgres-config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
            - name: postgres-config
              mountPath: /docker-entrypoint-initdb.d/01-init.sh
              subPath: init.sh
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
          startupProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
            periodSeconds: 10
            failureThreshold: 6
          lifecycle:
            preStop:
              exec:
                command: ["pg_ctl", "stop", "-D", "/var/lib/postgresql/data", "-m", "fast", "-t", "90"]

        - name: pgbouncer
          image: {{ .Values.pgbouncer.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 6432
              protocol: TCP
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
            - name: pgbouncer-run
              mountPath: /var/run/pgbouncer
          livenessProbe:
            exec:
              command: ["pg_isready", "-h", "127.0.0.1", "-p", "6432"]
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
        - name: postgres-config
          configMap:
            name: {{ include "expertise-api.fullname" . }}-postgres
        - name: pgbouncer-config
          configMap:
            name: {{ include "expertise-api.fullname" . }}-pgbouncer
        # Required because pgbouncer container has readOnlyRootFilesystem=true
        # but the daemon writes its PID file and control socket here.
        - name: pgbouncer-run
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
