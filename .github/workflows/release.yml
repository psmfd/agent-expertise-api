name: Release

on:
  push:
    branches: [main]

# Default to least-priv at the workflow level; jobs scope up only what they need.
permissions:
  contents: read

# Never cancel a release in flight; only one release runs at a time per ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # tag + commit changelog
      issues: write         # release-notes / issue comments
      pull-requests: write  # release-notes / PR comments
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Sync the Helm chart's appVersion with the just-released image tag so
      # `helm list` / `helm history` reflect what's actually deployed. The
      # `[skip ci]` trailer prevents a workflow re-trigger on the resulting
      # push; semantic-release ignores non-Conventional-Commits messages so
      # this commit will not influence the next version bump.
      #
      # TOCTOU note: the chart trails the image by one commit on main. The
      # infra repo (agent-expertise-api-infra) sets image.tag explicitly via
      # the dispatch payload at deploy time, so appVersion is cosmetic for
      # runtime correctness; the sync exists for `helm list` clarity.
      - name: Sync Chart.yaml version + appVersion
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          NEW_VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          yq -i '.version = strenv(NEW_VERSION) | .appVersion = strenv(NEW_VERSION)' helm/expertise-api/Chart.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/expertise-api/Chart.yaml
          git commit -m "chore(helm): sync chart version + appVersion to ${NEW_VERSION} [skip ci]"
          git push

  build-and-push:
    name: Build & Push Docker Image
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # gh release upload (openapi.json + sha256, Part D C8)
      packages: write   # push to GHCR (image + chart OCI artifact)
      id-token: write   # cosign keyless OIDC signing (Sigstore Fulcio)

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache ONNX model files
        id: model-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: src/ExpertiseApi/models
          key: onnx-bge-micro-v2-quantized-${{ hashFiles('scripts/download-models.sh') }}

      - name: Download ONNX model files
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: bash scripts/download-models.sh

      # Build-time OpenAPI document emission (Part D C8). Runs on the runner host
      # — NOT inside the multi-stage Docker build — because we need the resulting
      # openapi.json file present on the runner for the later `gh release upload`
      # step. The Docker build has its own SDK image and does its own dotnet publish
      # in parallel; this duplication adds ~30s and produces the artifact that the
      # release attaches as a pinned asset for downstream integrators (#147, #148).
      # See docs/security/integration-threat-model.md Part D C8.
      - name: Setup .NET (for build-time OpenAPI emission)
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Build (emits artifacts/openapi/ExpertiseApi.json)
        run: |
          dotnet build src/ExpertiseApi/ExpertiseApi.csproj \
            --configuration Release \
            --disable-build-servers
          test -f src/ExpertiseApi/artifacts/openapi/ExpertiseApi.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.release.outputs.new-release-version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.release.outputs.new-release-version }}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Supply-chain signing (cosign keyless OIDC) -----------------------
      # Both the image and the Helm chart OCI artifact are signed by the
      # workflow's GitHub Actions OIDC token via Sigstore Fulcio. No
      # long-lived keys to manage; signatures land as adjacent OCI
      # artifacts (.sig) in GHCR. Verification recipe in README.
      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Sign Docker image by digest (keyless)
        env:
          IMAGES: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # Sign by digest — NOT by tag. Tags are mutable; digests are not.
        # COSIGN_EXPERIMENTAL=1 is no longer required on cosign v2; left
        # unset deliberately.
        run: |
          set -euo pipefail
          # All tags point at the same digest after a single buildx push;
          # extract the repository name (everything before the first :) from
          # the first tag and sign once at the digest.
          repo=$(printf '%s\n' "$IMAGES" | head -n1 | cut -d: -f1)
          cosign sign --yes "${repo}@${DIGEST}"

      # ---- Helm chart OCI publish + signing ---------------------------------
      # Publish the chart as an OCI artifact alongside the image, then sign
      # it with the same keyless OIDC identity. Consumers can install via
      # `helm install foo oci://ghcr.io/thesemicolon/charts/expertise-api`.
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.18.3

      - name: Sync chart version + appVersion to release version
        env:
          NEW_VERSION: ${{ needs.release.outputs.new-release-version }}
        # The release job pushed an appVersion update commit to main, but
        # this job's checkout happened before that push and so still sees
        # the prior Chart.yaml. Apply the same version (and align chart
        # version with app version) here so the packaged tarball matches
        # the released image.
        run: |
          set -euo pipefail
          yq -i '.version = strenv(NEW_VERSION) | .appVersion = strenv(NEW_VERSION)' helm/expertise-api/Chart.yaml

      - name: Resolve lowercase owner for OCI paths
        id: owner
        # GHCR (and the OCI distribution spec) require all path components to
        # be lowercase. ${{ github.repository_owner }} preserves the canonical
        # GitHub case (e.g. "TheSemicolon"). docker/metadata-action auto-
        # lowercases the image path, but helm push + cosign sign use raw
        # string interpolation and would otherwise fail with
        # "name unknown: repository name must be lowercase".
        run: |
          set -euo pipefail
          lc=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          printf 'lc=%s\n' "$lc" >> "$GITHUB_OUTPUT"

      - name: Helm registry login (GHCR)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package + push Helm chart to GHCR OCI
        id: helm-push
        env:
          NEW_VERSION: ${{ needs.release.outputs.new-release-version }}
          OWNER_LC: ${{ steps.owner.outputs.lc }}
        run: |
          set -euo pipefail
          helm package helm/expertise-api --destination dist/
          # `helm push` prints `Pushed:` and `Digest: sha256:...` to stdout
          # (cmd/helm/push.go uses cmd.OutOrStdout()); capture both with 2>&1
          # so the runner log still shows them and the substitution captures
          # the digest. Sign by digest (immutable), not by tag.
          chart_tgz="dist/expertise-api-${NEW_VERSION}.tgz"
          push_out=$(helm push "$chart_tgz" "oci://ghcr.io/${OWNER_LC}/charts" 2>&1 | tee push.log)
          chart_digest=$(printf '%s\n' "$push_out" | awk '/^Digest: /{print $2}')
          [ -n "$chart_digest" ] || { echo "failed to parse chart digest from helm push output" >&2; exit 1; }
          printf 'digest=%s\n' "$chart_digest" >> "$GITHUB_OUTPUT"

      - name: Sign Helm chart artifact (keyless)
        env:
          CHART_DIGEST: ${{ steps.helm-push.outputs.digest }}
          OWNER_LC: ${{ steps.owner.outputs.lc }}
        run: |
          set -euo pipefail
          cosign sign --yes "ghcr.io/${OWNER_LC}/charts/expertise-api@${CHART_DIGEST}"

      # ---- OpenAPI document + sha256 as pinned release assets (Part D C8) ---
      # The build-time generator wrote ExpertiseApi.json to artifacts/openapi/
      # earlier in this job. Compute the sha256 and attach both to the GitHub
      # Release that semantic-release created in the upstream job. Downstream
      # integrators (skill #147, pi extension #148) verify the hash before
      # consuming the spec. No --clobber: tags are immutable in this pipeline.
      - name: Attach openapi.json + sha256 to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.release.outputs.new-release-version }}
        run: |
          set -euo pipefail
          src=src/ExpertiseApi/artifacts/openapi/ExpertiseApi.json
          out_dir=dist/openapi
          mkdir -p "$out_dir"
          cp "$src" "$out_dir/openapi.json"
          sha256sum "$out_dir/openapi.json" | awk '{print $1}' > "$out_dir/openapi.json.sha256"
          gh release upload "$TAG" \
            "$out_dir/openapi.json" \
            "$out_dir/openapi.json.sha256" \
            --repo "${{ github.repository }}"

      # ---- cosign sign-blob over openapi.json (Part D C8 trust anchor) ------
      # The sha256 file is in-band with the artifact it attests to. Anyone
      # with `contents: write` on the repo (admins, future write collaborators,
      # a compromised GITHUB_TOKEN in any workflow on main) could swap both
      # files consistently and break the C8 trust anchor without detection.
      # cosign sign-blob via the same Sigstore Fulcio keyless OIDC identity
      # used for the image and chart binds provenance to *this workflow's*
      # OIDC token, moving the trust root from "GitHub Releases is honest"
      # to "Sigstore Fulcio cert chain + GitHub Actions OIDC issuer".
      # Ordered AFTER the upload so a signing failure does not leave a
      # release without the primary artifacts; the partial-state degrades
      # to pre-#172 trust posture (sha256-only) rather than no-artifact.
      - name: Sign openapi.json with cosign (keyless OIDC)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.release.outputs.new-release-version }}
        run: |
          set -euo pipefail
          out_dir=dist/openapi
          cosign sign-blob --yes \
            --output-signature "$out_dir/openapi.json.sig" \
            --output-certificate "$out_dir/openapi.json.pem" \
            "$out_dir/openapi.json"
          gh release upload "$TAG" \
            "$out_dir/openapi.json.sig" \
            "$out_dir/openapi.json.pem" \
            --repo "${{ github.repository }}"

      - name: Dispatch deploy to infra repo
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: TheSemicolon/agent-expertise-api-infra
          event-type: deploy
          client-payload: '{"image_tag": "v${{ needs.release.outputs.new-release-version }}"}'
