name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Cancel queued PR runs when a new push lands on the same PR ref. Don't cancel
# push-to-dev runs in flight — they may be the input to a release cut.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ExpertiseApi.slnx --disable-build-servers

      - name: SCA — vulnerable NuGet packages
        run: |
          dotnet list ExpertiseApi.slnx package --vulnerable --include-transitive | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable NuGet packages detected — see vuln-report.txt"
            exit 1
          fi

      # Build-time OpenAPI document emission (Part D C8) is wired via
      # Microsoft.Extensions.ApiDescription.Server in the API csproj. The generator
      # runs as part of `dotnet build`; runtime startup guards that would otherwise
      # reject the source-controlled placeholder configuration are bypassed for the
      # `dotnet-getdocument` entry assembly. See AuthExtensions.IsBuildTimeOpenApiContext.
      - name: Build
        run: dotnet build ExpertiseApi.slnx --configuration Release --no-restore --disable-build-servers

      # Smoke-check that build-time OpenAPI document emission (Part D C8) succeeded.
      # release.yml picks up artifacts/openapi/ExpertiseApi.json for the GitHub Release
      # asset attachment. Fail loud here rather than discover the absence in a release run.
      - name: Verify openapi.json artifact present
        run: test -f src/ExpertiseApi/artifacts/openapi/ExpertiseApi.json

      # Analyzer baseline gate (issue #101, ADR-006). The codebase reached
      # zero analyzer warnings via PR7a/PR7b/PR7c; this step prevents
      # regression. Use `dotnet format analyzers` so whitespace/style noise
      # cannot trip the gate — only analyzer-rule violations do.
      # Note: --no-restore is intentionally omitted; `dotnet format analyzers`
      # invokes its own MSBuild instance which doesn't see the prior
      # restore's output via project.assets.json under all path layouts.
      - name: Format gate (analyzers must be clean)
        run: dotnet format analyzers ExpertiseApi.slnx --verify-no-changes

      - name: Download ONNX model files
        run: bash scripts/download-models.sh

      - name: Test
        run: |
          dotnet test ExpertiseApi.slnx \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory test-results

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: test-results/*.trx
          retention-days: 14

  pi-extension-typecheck:
    name: pi extension typecheck + tests (expertise-api)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
      - name: Install deps
        working-directory: .pi/extensions/expertise-api
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        working-directory: .pi/extensions/expertise-api
        run: npm run typecheck
      - name: Test
        working-directory: .pi/extensions/expertise-api
        run: npm test

  helm-lint:
    name: Helm lint + render tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.18.3

      - name: Helm lint (strict)
        run: helm lint --strict helm/expertise-api

      - name: Helm render tests
        run: bash helm/expertise-api/tests/test-render.sh

  apictl-restart-race-macos:
    name: apictl restart race regression (macOS)
    runs-on: macos-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run apictl restart race regression test
        run: bash scripts/test/test-apictl-restart.sh

  apictl-restart-race-debian13:
    name: apictl restart race regression (Debian 13 / systemd)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Privileged container; restrict to same-repo PRs and pushes to avoid
    # running --privileged docker for arbitrary fork-PR content. Fork PRs
    # still get coverage from the macos and build-and-test jobs.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Debian 13 systemd-enabled image
        run: docker build -t apictl-debian13 -f scripts/test/Dockerfile.debian13 scripts/test

      - name: Start container (systemd as PID 1)
        run: |
          docker run -d --name apictl-test \
            --privileged \
            --cgroupns=host \
            --tmpfs /tmp --tmpfs /run --tmpfs /run/lock \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "$PWD:/workspace:ro" \
            apictl-debian13
          # Surface container state immediately so a dead PID 1 shows up in
          # logs rather than as a silent wait-loop timeout.
          sleep 2
          docker ps -a --filter name=apictl-test
          docker logs apictl-test || true
          # Wait for systemd to settle inside the container.
          for _ in $(seq 1 30); do
            if docker exec apictl-test systemctl is-system-running --wait 2>/dev/null; then
              break
            fi
            sleep 1
          done
          docker exec apictl-test systemctl --no-pager status >/dev/null || true

      - name: Run apictl restart race regression test (in container, as user 'apictl')
        run: |
          docker exec -u apictl apictl-test bash -lc '
            cp -r /workspace /home/apictl/repo &&
            cd /home/apictl/repo &&
            bash scripts/test/test-apictl-restart.sh
          '

      - name: Container logs on failure
        if: failure()
        run: |
          docker logs apictl-test || true
          docker exec apictl-test journalctl --no-pager -n 200 || true

      - name: Tear down container
        if: always()
        run: docker rm -f apictl-test || true

  openapi-diff:
    name: OpenAPI breaking-change check
    # PR-only: a push to dev has no base to diff against (semantically the spec
    # IS dev at that point). Required-check status, if/when promoted in branch
    # protection, applies only to PRs into main/dev.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Label gate is read via the github.event.pull_request.labels payload
      # (no API call needed), but pull-requests: read keeps the principle of
      # least-surprise if a future refactor moves to gh CLI for label query.
      pull-requests: read

    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: head

      - name: Checkout base ref (${{ github.event.pull_request.base.ref }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pin to the actual base SHA at PR creation time, not the moving
          # branch tip. Diff semantics match what the merge-base would resolve
          # to had we used `actions/checkout@... { ref: refs/heads/${base} }`.
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: head/global.json

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          # Distinct from build-and-test cache (different working trees, both
          # csproj hashes contribute). restore-keys fall back to build-and-test
          # cache to avoid cold restore on first run.
          key: nuget-${{ runner.os }}-oasdiff-${{ hashFiles('head/**/*.csproj', 'base/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-oasdiff-
            nuget-${{ runner.os }}-

      - name: Build PR head spec
        working-directory: head
        run: dotnet build ExpertiseApi.slnx --configuration Release --disable-build-servers

      - name: Build base ref spec (tolerate missing / failure)
        id: base-build
        working-directory: base
        # Tolerate two edge cases without failing the gate:
        #   1. base ref pre-dates the API project (introductory PR after
        #      reorg) — no diff possible, treat as non-breaking.
        #   2. base build fails (SDK drift, transient infra) — we cannot
        #      diff, but failing the gate would block unrelated PRs on
        #      base-branch breakage. Surface as a Warning instead.
        # set -uo pipefail (no -e) so we can capture rc explicitly.
        run: |
          set -uo pipefail
          if [ ! -f src/ExpertiseApi/ExpertiseApi.csproj ]; then
            echo "::notice::base ref has no API project; skipping diff"
            echo "buildable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          dotnet build ExpertiseApi.slnx --configuration Release --disable-build-servers
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::warning::base ref build failed (rc=$rc); cannot diff openapi spec — treating as non-breaking"
            echo "buildable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "buildable=true" >> "$GITHUB_OUTPUT"

      - name: Install oasdiff (SHA-pinned binary release)
        run: |
          set -euo pipefail
          ver=v1.15.3
          # SHA-256 from upstream release page checksums.txt
          # https://github.com/oasdiff/oasdiff/releases/tag/v1.15.3
          expected_sha=a8b2f765dd976792f6fb14a5b9854fe94d73aa3b777161d45535f9002b7a4575
          url="https://github.com/oasdiff/oasdiff/releases/download/${ver}/oasdiff_${ver#v}_linux_amd64.tar.gz"
          curl -fsSL -o oasdiff.tgz "$url"
          echo "${expected_sha}  oasdiff.tgz" | sha256sum -c -
          tar -xzf oasdiff.tgz oasdiff
          sudo mv oasdiff /usr/local/bin/oasdiff
          oasdiff --version

      - name: oasdiff breaking-change scan
        id: diff
        if: steps.base-build.outputs.buildable == 'true'
        # Capture exit code without aborting the step; the next step is the
        # policy gate (label override vs hard fail).
        run: |
          set -uo pipefail
          base=base/src/ExpertiseApi/artifacts/openapi/ExpertiseApi.json
          head=head/src/ExpertiseApi/artifacts/openapi/ExpertiseApi.json
          if [ ! -f "$base" ]; then
            echo "::notice::base spec absent (feature-introducing PR); treating as non-breaking"
            echo "breaking=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # --format githubactions annotates the PR diff with breaking findings.
          # oasdiff exits non-zero iff breaking changes are present.
          oasdiff breaking "$base" "$head" --format githubactions
          rc=$?
          if [ $rc -eq 0 ]; then
            echo "breaking=false" >> "$GITHUB_OUTPUT"
          else
            echo "breaking=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Enforce gate or honor breaking-change-approved label
        if: steps.base-build.outputs.buildable == 'true'
        env:
          BREAKING: ${{ steps.diff.outputs.breaking }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          if [ "${BREAKING:-false}" != "true" ]; then
            echo "no breaking OpenAPI changes"
            exit 0
          fi
          if printf '%s' "$LABELS" | jq -e 'any(. == "breaking-change-approved")' >/dev/null; then
            echo "::warning::Breaking OpenAPI changes detected; bypassing gate via" \
                 "'breaking-change-approved' label (auto-removed on merge)"
            exit 0
          fi
          echo "::error::Breaking OpenAPI changes detected. To merge anyway," \
               "apply the 'breaking-change-approved' label to this PR."
          exit 1
