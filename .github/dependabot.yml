version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - nuget
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # FluentAssertions v8+ is governed by the Xceed Commercial license and
      # requires a paid subscription for commercial use. This repo migrated to
      # AwesomeAssertions (Apache 2.0 community fork). Any future Dependabot PR
      # that tries to re-add FluentAssertions must be rejected.
      - dependency-name: "FluentAssertions"
      # Microsoft.OpenApi is a direct security pin held at the 2.x major (see
      # src/ExpertiseApi/ExpertiseApi.csproj). The 3.x major made
      # IOpenApiMediaType.Example read-only, which the Microsoft.AspNetCore.OpenApi
      # 10.0.x source generator still assigns to (CS0200 build failure). Ignore
      # only the major bump so 2.x minor/patch security updates keep flowing.
      # Drop this once Microsoft.AspNetCore.OpenApi's generator supports 3.x (#390).
      - dependency-name: "Microsoft.OpenApi"
        update-types:
          - "version-update:semver-major"
    groups:
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
          - "Pgvector.EntityFrameworkCore*"
      aspnet-core:
        patterns:
          - "Microsoft.AspNetCore.*"
      serilog:
        patterns:
          - "Serilog.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore
      include: scope
    groups:
      docker-images:
        patterns:
          - "*"
